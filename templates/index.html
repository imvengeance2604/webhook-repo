<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Activity Monitor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <svg class="github-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        <div>
          <h1 class="title">Activity Monitor</h1>
          <p class="subtitle">Real-time GitHub repository events</p>
        </div>
      </div>
      <div class="header-right">
        <div class="status-badge" id="status-badge">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Connecting...</span>
        </div>
        <div class="next-refresh" id="next-refresh">Refreshing in <span id="countdown">15</span>s</div>
      </div>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar" id="stats-bar" style="display:none">
      <div class="stat-pill push-pill">
        <span class="stat-icon">↑</span>
        <span id="push-count">0</span> Pushes
      </div>
      <div class="stat-pill pr-pill">
        <span class="stat-icon">⇄</span>
        <span id="pr-count">0</span> Pull Requests
      </div>
      <div class="stat-pill merge-pill">
        <span class="stat-icon">⊕</span>
        <span id="merge-count">0</span> Merges
      </div>
      <div class="stat-pill total-pill">
        <span class="stat-icon">∑</span>
        <span id="total-count">0</span> Total
      </div>
    </div>

    <!-- Event feed -->
    <main class="feed" id="event-feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
          </svg>
        </div>
        <h2>No events yet</h2>
        <p>Push to your GitHub repository to see activity appear here.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      Last updated: <span id="last-updated">—</span>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
